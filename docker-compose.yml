services:
  core-backend:
    build:
      context: ./core-backend
    env_file:
      - ./core-backend/.env
    environment:
      PORT: ${CORE_PORT:-4000}
    ports:
      - "${CORE_PORT:-4000}:4000"
    restart: unless-stopped
    networks:
      - public
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  realtime-service:
    build:
      context: ./realtime-service
    env_file:
      - ./realtime-service/.env
    environment:
      PORT: ${REALTIME_PORT:-4003}
    ports:
      - "${REALTIME_PORT:-4003}:4003"
    restart: unless-stopped
    networks:
      - public
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4003/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  worker-service:
    build:
      context: ./worker-service
    env_file:
      - ./worker-service/.env
    environment:
      BACKUP_OUTPUT_DIR: /data
      # Make worker run as an HTTP web service (useful for status endpoints).
      WORKER_HTTP_ENABLED: ${WORKER_HTTP_ENABLED:-1}
      PORT: ${WORKER_PORT:-10000}
      # Supabase source for backups
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-300}
      BACKUP_BATCH_SIZE: ${BACKUP_BATCH_SIZE:-500}
      BACKUP_STATE_FILE: ${BACKUP_STATE_FILE:-/data/state.json}
    volumes:
      - worker_data:/data
    ports:
      - "${WORKER_PORT:-10000}:10000"
    restart: unless-stopped
    networks:
      - public

  # Optional local MongoDB for Next.js message backup API routes.
  # In production, prefer MongoDB Atlas and set MONGODB_URI on `frontend-service`.
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - public
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017/admin", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend-service:
    build:
      context: ./frontend-service
      network: host
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://core-backend:4000}
        NEXT_PUBLIC_CHAT_SOCKET_URL: ${NEXT_PUBLIC_CHAT_SOCKET_URL:-http://realtime-service:4003}
        NEXT_PUBLIC_CALL_SOCKET_URL: ${NEXT_PUBLIC_CALL_SOCKET_URL:-http://realtime-service:4003}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_ICE_SERVERS_JSON: ${NEXT_PUBLIC_ICE_SERVERS_JSON:-[{"urls":["stun:stun.l.google.com:19302"]}]}
    env_file:
      - ./frontend-service/.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # In local docker-compose we publish 3000:3000, so force the container to listen on 3000
      # (Render/Railway inject PORT=10000-style values; that's handled by the platform, not compose).
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # Optional MongoDB (used by Next.js API routes like /api/message-backup)
      MONGODB_URI: ${MONGODB_URI:-}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-}
    ports:
      - "3000:3000"
    depends_on:
      core-backend:
        condition: service_healthy
      realtime-service:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - public

volumes:
  worker_data:
  mongo_data:

networks:
  public:
  

